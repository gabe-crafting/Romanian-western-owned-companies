name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Pages not enabled
        if: failure() && steps.pages.outcome == 'failure'
        run: |
          echo "::error::GitHub Pages is not enabled for this repository."
          echo ""
          echo "Enable it manually (required once):"
          echo "  1. Open https://github.com/${{ github.repository }}/settings/pages"
          echo "  2. Under Build and deployment, set Source to GitHub Actions"
          echo "  3. Re-run this workflow from the Actions tab"
          echo ""
          echo "Optional: add a repo secret GH_PAGES_TOKEN (PAT with repo + pages scope)"
          echo "and set enablement: true on configure-pages to auto-enable via API."
          exit 1

      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
